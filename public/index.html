<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmashCars 3D 🏎️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{
  --blue:#3b82f6;--blue-light:#93c5fd;--blue-dark:#1e40af;
  --red:#ef4444;--red-light:#fca5a5;--red-dark:#991b1b;
  --gold:#f59e0b;--green:#22c55e;--purple:#a855f7;
}
body{background:#000;color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ===== LOBBY ===== */
#lobby{position:relative;z-index:10;text-align:center;max-width:440px;width:90%}
.logo-wrap{margin-bottom:30px;position:relative}
.logo{font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 40%,#f87171 80%,#fbbf24 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(167,139,250,0.5));
  text-shadow:none;line-height:1}
.logo-3d{position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;letter-spacing:4px;
  -webkit-text-fill-color:transparent;-webkit-text-stroke:1px rgba(0,0,0,0.5);
  filter:blur(2px);opacity:0.4;z-index:-1}
.logo-sub{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#555;margin-top:6px}
.made-by{font-size:11px;color:#444;letter-spacing:2px;margin-top:2px}
.made-by span{color:#a78bfa;font-weight:600}

.card{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:22px;margin-bottom:12px;
  backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06)}
.card h3{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;font-family:'Orbitron',monospace}
input[type=text]{width:100%;padding:13px 18px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:#fff;font-size:15px;font-family:'Rajdhani',sans-serif;
  outline:none;margin-bottom:10px;transition:all 0.2s}
input:focus{border-color:#a78bfa;background:rgba(167,139,250,0.08);box-shadow:0 0 0 3px rgba(167,139,250,0.1)}
input::placeholder{color:#333}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;
  font-size:15px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-bottom:8px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.2s}
.btn:hover::after{opacity:1}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.4)}
.btn:active{transform:translateY(0)}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,#3b82f6);box-shadow:0 4px 15px rgba(59,130,246,0.3)}
.btn-purple{background:linear-gradient(135deg,#6d28d9,#a855f7);box-shadow:0 4px 15px rgba(168,85,247,0.3)}
.btn-ghost{background:rgba(255,255,255,0.06);color:#888}
.divider{display:flex;align-items:center;gap:10px;color:#333;font-size:11px;margin:8px 0;letter-spacing:2px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
#lobby-msg{font-size:13px;color:#555;margin-top:8px}

/* ===== GAME ===== */
#game-wrap{display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:#000;flex-direction:column}
#game-wrap.active{display:flex}
#canvas-container{position:relative;width:100%;max-width:680px}
canvas{display:block;width:100%;border-radius:0;image-rendering:pixelated}

/* ===== HUD ===== */
#hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:8px;pointer-events:none;z-index:10;gap:4px}
.phud{background:linear-gradient(135deg,rgba(0,0,0,0.85),rgba(0,0,0,0.7));
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 14px;
  min-width:140px;backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)}
.phud-name{font-family:'Orbitron',monospace;font-weight:700;font-size:12px;margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.bar-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:5px}
.bar{height:100%;border-radius:3px;transition:width 0.12s;position:relative}
.bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.3);border-radius:3px}
.weapon-tag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);letter-spacing:1px;text-transform:uppercase;
  display:inline-block;font-family:'Orbitron',monospace}
.score-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;margin-top:4px}
.status-icons{font-size:13px;margin-top:3px;height:16px}
#hud-center{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:auto}
.leave-btn{font-size:10px;color:#333;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  padding:4px 12px;border-radius:8px;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:1px}
.leave-btn:hover{color:#888;border-color:rgba(255,255,255,0.15)}
.round-badge{font-size:9px;color:#444;font-family:'Orbitron',monospace;letter-spacing:1px;background:rgba(255,255,255,0.03);padding:3px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.05)}

/* ===== OVERLAY ===== */
#overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,rgba(5,5,20,0.97),rgba(10,10,30,0.95));
  border:1px solid rgba(255,255,255,0.1);border-radius:24px;
  padding:32px 40px;text-align:center;z-index:20;min-width:280px;
  backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.03),inset 0 1px 0 rgba(255,255,255,0.06)}
#overlay h2{font-family:'Orbitron',monospace;font-size:1.8rem;margin-bottom:8px;font-weight:900}
#overlay p{color:#666;font-size:14px;margin-bottom:20px;line-height:1.6}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-row .btn{width:auto;padding:11px 24px;display:inline-block;font-size:13px}
.btn-green{background:linear-gradient(135deg,#15803d,#22c55e);box-shadow:0 4px 15px rgba(34,197,94,0.3)}
.btn-red{background:linear-gradient(135deg,#991b1b,#ef4444);box-shadow:0 4px 15px rgba(239,68,68,0.3)}

/* ===== CHAT ===== */
#chat-wrap{position:absolute;bottom:8px;right:10px;width:190px;z-index:15}
#chat-msgs{max-height:90px;overflow:hidden;display:flex;flex-direction:column-reverse;gap:3px;margin-bottom:5px}
.chat-msg{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:4px 9px;font-size:11px;line-height:1.4;animation:fadeMsg 9s forwards}
.chat-msg .cn{font-weight:700;font-family:'Orbitron',monospace;font-size:9px}
.cn-0{color:#60a5fa}.cn-1{color:#f87171}
@keyframes fadeMsg{0%,65%{opacity:1}100%{opacity:0}}
#chat-input-row{display:flex;gap:4px}
#chat-in{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;color:#fff;font-size:11px;font-family:'Rajdhani',sans-serif;
  padding:5px 9px;outline:none}
#chat-in:focus{border-color:rgba(167,139,250,0.4)}
#chat-send{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.2);
  color:#a78bfa;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px}
#chat-send:hover{background:rgba(167,139,250,0.25)}

/* ===== MOBILE ===== */
#mobile-ctrl{display:none;position:fixed;bottom:0;left:0;width:100%;height:170px;z-index:30;pointer-events:none}
#joystick-zone{position:absolute;left:18px;bottom:18px;width:130px;height:130px;pointer-events:all}
#joystick-base{position:absolute;inset:0;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:50%}
#joystick-knob{position:absolute;width:48px;height:48px;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.3),rgba(255,255,255,0.1));
  border:2px solid rgba(255,255,255,0.3);border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%)}
#fire-btn{position:absolute;right:18px;bottom:18px;width:80px;height:80px;
  background:radial-gradient(circle at 35% 35%,#f87171,#991b1b);
  border:3px solid rgba(255,100,100,0.3);border-radius:50%;font-size:28px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;user-select:none;
  box-shadow:0 0 30px rgba(239,68,68,0.4),inset 0 2px 0 rgba(255,255,255,0.2)}
#fire-btn:active{transform:scale(0.9)}
#boost-btn{position:absolute;right:112px;bottom:22px;width:58px;height:58px;
  background:radial-gradient(circle at 35% 35%,#fbbf24,#b45309);
  border:2px solid rgba(251,191,36,0.3);border-radius:50%;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;user-select:none;
  box-shadow:0 0 20px rgba(251,191,36,0.3)}
@media(max-width:680px){#mobile-ctrl{display:block}#chat-wrap{display:none}}

/* ===== WATERMARK ===== */
#watermark{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:3px;
  font-family:'Orbitron',monospace;text-transform:uppercase;pointer-events:none;z-index:5}
#watermark span{color:rgba(167,139,250,0.3)}
</style>
</head>
<body>

<!-- LOBBY BACKGROUND -->
<canvas id="bg-canvas" style="position:fixed;inset:0;z-index:0"></canvas>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo-wrap">
    <div class="logo">SMASHCARS</div>
    <div class="logo-sub">3D Battle Arena</div>
    <div class="made-by">Crafted by <span>Utkarsh</span></div>
  </div>
  <div class="card">
    <h3>Identity</h3>
    <input type="text" id="nameInput" placeholder="Your name..." maxlength="16"/>
    <h3>Room</h3>
    <input type="text" id="roomInput" placeholder="Room code (share with friend)..." maxlength="20"/>
    <button class="btn btn-blue" onclick="joinRoom(false)">⚔️ Join / Create Room</button>
    <div class="divider">or</div>
    <button class="btn btn-purple" onclick="joinRoom(true)">🤖 vs AI Bot</button>
    <button class="btn btn-ghost" onclick="randomRoom()" style="margin-top:4px">🎲 Random Room</button>
  </div>
  <div id="lobby-msg"></div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="canvas-container">
    <canvas id="gc" width="680" height="420"></canvas>
    <div id="watermark">Made by <span>Utkarsh</span></div>

    <!-- HUD -->
    <div id="hud">
      <div class="phud">
        <div class="phud-name cn-0" id="pname1">PLAYER 1</div>
        <div class="bar-label">Health</div>
        <div class="bar-bg"><div class="bar" id="hp1" style="width:100%;background:linear-gradient(90deg,#22c55e,#4ade80)"></div></div>
        <div class="bar-label">Ammo</div>
        <div class="bar-bg"><div class="bar" id="am1" style="width:100%;background:linear-gradient(90deg,#d97706,#f59e0b)"></div></div>
        <div class="weapon-tag" id="w1" style="color:#f59e0b">Rocket</div>
        <div class="score-val cn-0" id="sc1">0</div>
        <div class="status-icons" id="si1"></div>
      </div>
      <div id="hud-center">
        <div class="round-badge">SMASHCARS</div>
        <div class="leave-btn" onclick="leaveGame()">EXIT</div>
      </div>
      <div class="phud" style="text-align:right">
        <div class="phud-name cn-1" id="pname2" style="margin-left:auto">PLAYER 2</div>
        <div class="bar-label">Health</div>
        <div class="bar-bg"><div class="bar" id="hp2" style="width:100%;background:linear-gradient(90deg,#dc2626,#f87171)"></div></div>
        <div class="bar-label">Ammo</div>
        <div class="bar-bg"><div class="bar" id="am2" style="width:100%;background:linear-gradient(90deg,#d97706,#f59e0b)"></div></div>
        <div class="weapon-tag" id="w2" style="color:#f59e0b;float:right">Rocket</div>
        <div class="score-val cn-1" id="sc2" style="clear:both">0</div>
        <div class="status-icons" id="si2" style="text-align:right"></div>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chat-wrap">
      <div id="chat-msgs"></div>
      <div id="chat-input-row">
        <input id="chat-in" type="text" placeholder="Chat..." maxlength="80" autocomplete="off"/>
        <button id="chat-send" onclick="sendChat()">→</button>
      </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay">
      <h2 id="ov-title">SMASHCARS</h2>
      <p id="ov-msg">Enter a room code and share with a friend!</p>
      <div class="btn-row" id="ov-btns"></div>
    </div>
  </div>

  <!-- MOBILE -->
  <div id="mobile-ctrl">
    <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-knob"></div></div>
    <div id="fire-btn">🔥</div>
    <div id="boost-btn">⚡</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// ANIMATED LOBBY BACKGROUND
// ============================================================
(function(){
  const c=document.getElementById('bg-canvas');
  const resize=()=>{c.width=innerWidth;c.height=innerHeight};
  resize(); window.addEventListener('resize',resize);
  const cx=c.getContext('2d');
  const lines=[];
  for(let i=0;i<20;i++) lines.push({x:Math.random()*c.width,y:Math.random()*c.height,
    vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,
    color:`hsl(${Math.random()*60+200},70%,60%)`,len:30+Math.random()*60,alpha:Math.random()});
  const nodes=[];
  for(let i=0;i<60;i++) nodes.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:1+Math.random()*2});
  function draw(){
    cx.fillStyle='rgba(0,0,0,0.08)';cx.fillRect(0,0,c.width,c.height);
    lines.forEach(l=>{
      l.x+=l.vx;l.y+=l.vy;l.alpha=0.3+Math.sin(Date.now()*0.001+l.x*0.01)*0.2;
      if(l.x<-100)l.x=c.width+100;if(l.x>c.width+100)l.x=-100;
      if(l.y<-100)l.y=c.height+100;if(l.y>c.height+100)l.y=-100;
      cx.strokeStyle=l.color.replace('60%',`${Math.floor(l.alpha*100)}%`);
      cx.lineWidth=1;cx.beginPath();cx.moveTo(l.x,l.y);cx.lineTo(l.x-l.vx*l.len,l.y-l.vy*l.len);cx.stroke();
    });
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>innerWidth)n.vx*=-1;if(n.y<0||n.y>innerHeight)n.vy*=-1;
      cx.beginPath();cx.arc(n.x,n.y,n.r,0,Math.PI*2);cx.fillStyle='rgba(167,139,250,0.4)';cx.fill();
    });
    nodes.forEach((a,i)=>nodes.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<100){cx.strokeStyle=`rgba(96,165,250,${(1-d/100)*0.15})`;
      cx.lineWidth=0.5;cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();}
    }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
// AUDIO
// ============================================================
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(type){
  try{
    AC.resume();
    const g=AC.createGain(),o=AC.createOscillator();
    const now=AC.currentTime;
    if(type==='shoot'){
      o.type='sawtooth';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(100,now+0.1);
      g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
      o.connect(g);g.connect(AC.destination);o.start(now);o.stop(now+0.1);
    }else if(type==='hit'){
      const buf=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=300;
      s.connect(f);f.connect(g);g.connect(AC.destination);
      g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
      s.start(now);o.disconnect();
    }else if(type==='pickup'){
      o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(1000,now+0.15);
      g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      o.connect(g);g.connect(AC.destination);o.start(now);o.stop(now+0.2);
    }else if(type==='win'){
      [523,659,784,1047].forEach((f,i)=>{
        const o2=AC.createOscillator(),g2=AC.createGain();
        o2.type='sine';o2.frequency.value=f;
        o2.connect(g2);g2.connect(AC.destination);
        g2.gain.setValueAtTime(0.15,now+i*0.13);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.13+0.3);
        o2.start(now+i*0.13);o2.stop(now+i*0.13+0.3);
      });
      o.disconnect();
    }else if(type==='chat'){
      o.type='sine';o.frequency.value=880;
      g.gain.setValueAtTime(0.06,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g);g.connect(AC.destination);o.start(now);o.stop(now+0.08);
    }
  }catch(e){}
}

// ============================================================
// CONSTANTS
// ============================================================
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=680,H=420;
let myId=null,mySlot=null,roomId=null;
let gameState=null,gameActive=false;
let keys={},shootCooldown=0;
let particles=[],screenShake={x:0,y:0,t:0};
let prevHp={0:100,1:100},prevPickups=99;
let frameCount=0;

const WCOLOR={rocket:'#f59e0b',laser:'#60a5fa',bomb:'#c084fc',shield:'#4ade80',speed:'#34d399',health:'#fb7185',mine:'#94a3b8'};
const WNAME={rocket:'Rocket',laser:'Laser',bomb:'Bomb',shield:'Shield',speed:'Speed',health:'Medkit',mine:'Mine'};
const WICON={rocket:'🚀',laser:'⚡',bomb:'💣',shield:'🛡',speed:'💨',health:'❤️',mine:'💀'};

const WALLS=[
  {x:310,y:60, w:60,h:14},
  {x:310,y:346,w:60,h:14},
  {x:60, y:180,w:14,h:60},
  {x:606,y:180,w:14,h:60},
  {x:200,y:120,w:14,h:50},
  {x:466,y:250,w:14,h:50},
];

// ============================================================
// SOCKET
// ============================================================
const socket=io();
socket.on('connect',()=>{myId=socket.id});
socket.on('joined',({slot})=>{mySlot=slot});
socket.on('waiting',()=>showOverlay('WAITING...','Share room code: <b style="color:#a78bfa">'+roomId+'</b>',[],false));
socket.on('roomFull',()=>{alert('Room full!');location.reload()});
socket.on('startGame',({players})=>{
  gameActive=true;particles=[];prevHp={0:100,1:100};hideOverlay();
  players.forEach(p=>{
    document.getElementById(`pname${p.slot+1}`).textContent=p.isBot?'🤖 BOT':p.name.toUpperCase();
    document.getElementById(`sc${p.slot+1}`).textContent=0;
  });
  ['1','2'].forEach(n=>{document.getElementById('hp'+n).style.width='100%';document.getElementById('am'+n).style.width='100%'});
});
socket.on('state',state=>{gameState=state;renderFrame(state);updateHud(state);checkSounds(state);frameCount++});
socket.on('gameOver',({winnerId,winnerName})=>{
  gameActive=false;
  const won=winnerId===myId;
  snd(won?'win':'hit');
  shake(won?4:12);
  showOverlay(won?'🏆 VICTORY!':'💀 DEFEATED',winnerName+' wins the round!',

// ============================================================
(function(){
  const zone=document.getElementById('joystick-zone');
  const knob=document.getElementById('joystick-knob');
  const fire=document.getElementById('fire-btn');
  const boost=document.getElementById('boost-btn');
  let jid=null;const R=42;
  zone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];jid=t.identifier;move(t.clientX,t.clientY)},{passive:false});
  document.addEventListener('touchmove',e=>{for(const t of e.changedTouches)if(t.identifier===jid){e.preventDefault();move(t.clientX,t.clientY)}},{passive:false});
  document.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===jid){jid=null;knob.style.transform='translate(-50%,-50%)';setKeys(0,0)}});
  function move(px,py){
    const r=zone.getBoundingClientRect();
    const dx=px-(r.left+r.width/2),dy=py-(r.top+r.height/2);
    const d=Math.sqrt(dx*dx+dy*dy),c=Math.min(d,R);
    const nx=d>0?dx/d:0,ny=d>0?dy/d:0;
    knob.style.transform=`translate(calc(-50% + ${nx*c}px),calc(-50% + ${ny*c}px))`;
    setKeys(nx,ny);
  }
  function setKeys(nx,ny){
    const k={};
    if(ny<-0.3)k['w']=true;if(ny>0.3)k['s']=true;
    if(nx<-0.3)k['a']=true;if(nx>0.3)k['d']=true;
    keys=k;socket.emit('keys',{...keys});
  }
  fire.addEventListener('touchstart',e=>{e.preventDefault();if(gameActive&&shootCooldown<=0){socket.emit('shoot');snd('shoot');shootCooldown=14}},{passive:false});
  boost.addEventListener('touchstart',e=>{e.preventDefault();keys['shift']=true;socket.emit('keys',{...keys})},{passive:false});
  boost.addEventListener('touchend',()=>{delete keys['shift'];socket.emit('keys',{...keys})});
})();

function draw3DBox(x,y,w,h,depth,topColor,sideColor,frontColor){
  // Front face
  ctx.fillStyle=frontColor;
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();
  // Top face (perspective)
  ctx.fillStyle=topColor;
  ctx.beginPath();
  ctx.moveTo(x,y);ctx.lineTo(x+depth,y-depth);
  ctx.lineTo(x+w+depth,y-depth);ctx.lineTo(x+w,y);
  ctx.closePath();ctx.fill();
  // Side face
  ctx.fillStyle=sideColor;
  ctx.beginPath();
  ctx.moveTo(x+w,y);ctx.lineTo(x+w+depth,y-depth);
  ctx.lineTo(x+w+depth,y+h-depth);ctx.lineTo(x+w,y+h);
  ctx.closePath();ctx.fill();
}

function drawCar3D(car,frame){
  const isMe=car.slot===mySlot;
  const baseColor=car.slot===0?'#1d4ed8':'#b91c1c';
  const midColor=car.slot===0?'#3b82f6':'#ef4444';
  const lightColor=car.slot===0?'#93c5fd':'#fca5a5';
  const darkColor=car.slot===0?'#1e3a8a':'#7f1d1d';

  ctx.save();
  ctx.translate(car.x,car.y);

  // Ground shadow (ellipse below car)
  ctx.save();
  ctx.globalAlpha=0.35;
  const shadowGrad=ctx.createRadialGradient(4,8,0,4,8,22);
  shadowGrad.addColorStop(0,'rgba(0,0,0,0.7)');
  shadowGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shadowGrad;
  ctx.beginPath();ctx.ellipse(4,8,22,10,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.rotate(car.angle);

  // Shield bubble
  if(car.shielded>0){
    const shieldAlpha=0.3+Math.sin(frame*0.12)*0.2;
    const shieldGrad=ctx.createRadialGradient(0,0,16,0,0,26);
    shieldGrad.addColorStop(0,`rgba(74,222,128,${shieldAlpha*0.3})`);
    shieldGrad.addColorStop(1,`rgba(74,222,128,${shieldAlpha})`);
    ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);
    ctx.fillStyle=shieldGrad;ctx.fill();
    ctx.strokeStyle=`rgba(74,222,128,${0.5+Math.sin(frame*0.12)*0.3})`;
    ctx.lineWidth=2;ctx.shadowColor='#4ade80';ctx.shadowBlur=12;ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Speed boost flame trail
  if(car.speedBoost>0){
    for(let i=1;i<=4;i++){
      ctx.globalAlpha=(0.6-i*0.12)*(car.speedBoost/240);
      const tg=ctx.createLinearGradient(-14-i*10,0,-14,0);
      tg.addColorStop(0,'transparent');tg.addColorStop(1,'#34d399');
      ctx.fillStyle=tg;
      ctx.beginPath();ctx.ellipse(-14-i*7,0,i*5,4-i*0.5,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // ---- 3D CAR BODY ----
  const depth=5; // 3D extrusion depth

  // Bottom shadow layer (3D thickness)
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.roundRect(-14+depth,-9+depth,28,18,5);ctx.fill();

  // Side face (right) - darkest
  ctx.fillStyle=darkColor;
  ctx.beginPath();
  ctx.moveTo(14,-9);ctx.lineTo(14+depth,-9-depth);
  ctx.lineTo(14+depth,9-depth);ctx.lineTo(14,9);
  ctx.closePath();ctx.fill();

  // Top face
  const topGrad=ctx.createLinearGradient(-14,-9,14,-9-depth);
  topGrad.addColorStop(0,lightColor);topGrad.addColorStop(1,midColor);
  ctx.fillStyle=topGrad;
  ctx.beginPath();
  ctx.moveTo(-14,-9);ctx.lineTo(-14+depth,-9-depth);
  ctx.lineTo(14+depth,-9-depth);ctx.lineTo(14,-9);
  ctx.closePath();ctx.fill();

  // Main body front face
  const bodyGrad=ctx.createLinearGradient(-14,-9,14,9);
  bodyGrad.addColorStop(0,lightColor);bodyGrad.addColorStop(0.4,midColor);bodyGrad.addColorStop(1,baseColor);
  ctx.fillStyle=bodyGrad;
  ctx.shadowColor=midColor;ctx.shadowBlur=8;
  ctx.beginPath();ctx.roundRect(-14,-9,28,18,5);ctx.fill();
  ctx.shadowBlur=0;

  // Metallic sheen on body
  const sheen=ctx.createLinearGradient(-14,-9,14,0);
  sheen.addColorStop(0,'rgba(255,255,255,0.15)');sheen.addColorStop(0.5,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;
  ctx.beginPath();ctx.roundRect(-14,-9,28,18,5);ctx.fill();

  // Cabin / roof (3D raised)
  ctx.fillStyle=darkColor;
  ctx.beginPath();ctx.roundRect(-2+depth,-7-depth,14,12,3);ctx.fill();
  const cabinGrad=ctx.createLinearGradient(-2,-7,10,-7);
  cabinGrad.addColorStop(0,darkColor);cabinGrad.addColorStop(1,baseColor);
  ctx.fillStyle=cabinGrad;
  ctx.beginPath();ctx.roundRect(-2,-7,14,12,3);ctx.fill();

  // Windshield (glass effect)
  const glassGrad=ctx.createLinearGradient(-1,-6,11,-6);
  glassGrad.addColorStop(0,'rgba(150,220,255,0.5)');glassGrad.addColorStop(0.5,'rgba(200,240,255,0.7)');glassGrad.addColorStop(1,'rgba(100,180,255,0.4)');
  ctx.fillStyle=glassGrad;
  ctx.beginPath();ctx.roundRect(0,-6,11,10,2);ctx.fill();
  // Glass reflection
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.moveTo(1,-5);ctx.lineTo(5,-5);ctx.lineTo(3,-2);ctx.closePath();ctx.fill();

  // Hood stripe
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(-14,-1.5,28,3);

  // Racing number
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 8px Orbitron,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(car.slot===0?'01':'02',-5,0);

  // Wheels (3D with rims)
  const wheelPositions=[[-12,7],[-12,-12],[2,7],[2,-12]];
  wheelPositions.forEach(([wx,wy])=>{
    // Tire shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.roundRect(wx+1,wy+1,9,5,2);ctx.fill();
    // Tire 3D side
    ctx.fillStyle='#0a0a0a';
    ctx.beginPath();ctx.roundRect(wx+8,wy,2,5,1);ctx.fill();
    // Tire
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();ctx.roundRect(wx,wy,9,5,2);ctx.fill();
    // Rim
    const rimGrad=ctx.createLinearGradient(wx,wy,wx+9,wy+5);
    rimGrad.addColorStop(0,'#666');rimGrad.addColorStop(0.5,'#aaa');rimGrad.addColorStop(1,'#555');
    ctx.fillStyle=rimGrad;
    ctx.beginPath();ctx.roundRect(wx+1,wy+1,7,3,1);ctx.fill();
    // Rim center bolt
    ctx.fillStyle='#ddd';
    ctx.beginPath();ctx.arc(wx+4,wy+2.5,1,0,Math.PI*2);ctx.fill();
  });

  // Exhaust pipes
  ctx.fillStyle='#555';
  ctx.beginPath();ctx.roundRect(-17,-6,4,3,1);ctx.fill();
  ctx.beginPath();ctx.roundRect(-17,3,4,3,1);ctx.fill();
  // Exhaust glow
  if(Math.random()<0.4){
    ctx.fillStyle='rgba(255,150,50,0.5)';
    ctx.beginPath();ctx.arc(-18,-4,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-18,4.5,2,0,Math.PI*2);ctx.fill();
  }

  // Gun barrel (3D)
  ctx.fillStyle='#444';ctx.beginPath();ctx.roundRect(12,-2.5,10,5,1.5);ctx.fill();
  ctx.fillStyle='#666';ctx.beginPath();ctx.roundRect(12,-1.5,10,3,1);ctx.fill();
  // Gun glow
  ctx.fillStyle=WCOLOR[car.weapon]||'#fff';
  ctx.shadowColor=WCOLOR[car.weapon];ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(22,0,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Headlights (lens flare)
  [[-7],[7]].forEach(([yo])=>{
    const hlGrad=ctx.createRadialGradient(13,yo,0,13,yo,5);
    hlGrad.addColorStop(0,'rgba(255,255,200,0.9)');hlGrad.addColorStop(0.5,'rgba(255,255,200,0.4)');hlGrad.addColorStop(1,'rgba(255,255,200,0)');
    ctx.fillStyle=hlGrad;ctx.shadowColor='rgba(255,255,200,0.8)';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(13,yo,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Tail lights
  [[-6],[6]].forEach(([yo])=>{
    ctx.fillStyle='rgba(255,50,50,0.7)';
    ctx.shadowColor='#ff3333';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(-14,yo,2.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  ctx.rotate(-car.angle);

  // Name tag with background
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath();ctx.roundRect(-20,-30,40,14,4);ctx.fill();
  ctx.fillStyle=isMe?lightColor:(car.slot===0?'#93c5fd':'#fca5a5');
  ctx.font='bold 9px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(car.isBot?'BOT':(isMe?'YOU':car.name.slice(0,5).toUpperCase()),0,-23);

  // HP pip bar above car
  const bw=34;const bx=-bw/2;const by=-38;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(bx-1,by-1,bw+2,7,3);ctx.fill();
  const hpGrad=ctx.createLinearGradient(bx,by,bx+bw,by);
  hpGrad.addColorStop(0,car.hp>50?'#22c55e':'#ef4444');hpGrad.addColorStop(1,car.hp>50?'#4ade80':'#f87171');
  ctx.fillStyle=hpGrad;ctx.shadowColor=car.hp>50?'#22c55e':'#ef4444';ctx.shadowBlur=4;
  ctx.beginPath();ctx.roundRect(bx,by,bw*(car.hp/100),5,2);ctx.fill();
  ctx.shadowBlur=0;

  ctx.restore();
}

// RENDER ARENA 3D
// ============================================================
function drawArena3D(){
  // Floor base
  const floorGrad=ctx.createLinearGradient(0,0,0,H);
  floorGrad.addColorStop(0,'#0c0c22');floorGrad.addColorStop(1,'#080815');
  ctx.fillStyle=floorGrad;ctx.fillRect(0,0,W,H);

  // Floor tiles with 3D perspective effect
  ctx.save();
  for(let x=0;x<W;x+=40){
    for(let y=0;y<H;y+=40){
      const dist=Math.hypot(x-W/2,y-H/2);
      const alpha=0.03+Math.max(0,(1-dist/300)*0.03);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;
      ctx.strokeStyle=`rgba(255,255,255,${alpha*0.5})`;
      ctx.lineWidth=0.5;
      ctx.beginPath();ctx.rect(x,y,40,40);ctx.fill();ctx.stroke();
    }
  }
  ctx.restore();

  // Racetrack markings
  ctx.save();
  ctx.setLineDash([20,15]);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Arena boundary - glowing neon walls
  const colors=['rgba(96,165,250,','rgba(167,139,250,','rgba(248,113,113,','rgba(96,165,250,'];
  const t=Date.now()*0.001;
  [0,1,2,3].forEach(i=>{
    const alpha=0.3+Math.sin(t+i*1.5)*0.15;
    ctx.strokeStyle=colors[i]+alpha+')';
    ctx.lineWidth=3;ctx.shadowColor=colors[i]+'0.8)';ctx.shadowBlur=15;
    ctx.strokeRect(2,2,W-4,H-4);ctx.shadowBlur=0;
  });

  // Corner orbs
  [[15,15],[W-15,15],[15,H-15],[W-15,H-15]].forEach(([x,y],i)=>{
    const pulse=0.5+Math.sin(t*1.5+i)*0.3;
    const cg=ctx.createRadialGradient(x,y,0,x,y,12);
    cg.addColorStop(0,`rgba(167,139,250,${pulse})`);cg.addColorStop(1,'rgba(167,139,250,0)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${pulse*0.8})`;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  });

  // 3D Obstacle walls
  WALLS.forEach(w=>{
    const depth=6;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();ctx.roundRect(w.x+depth,w.y+depth,w.w,w.h,4);ctx.fill();

    // Right face
    if(w.w>w.h){
      // Horizontal wall - side face bottom
      ctx.fillStyle='rgba(30,30,80,0.9)';
      ctx.beginPath();
      ctx.moveTo(w.x,w.y+w.h);ctx.lineTo(w.x+depth,w.y+w.h+depth);
      ctx.lineTo(w.x+w.w+depth,w.y+w.h+depth);ctx.lineTo(w.x+w.w,w.y+w.h);
      ctx.closePath();ctx.fill();
    } else {
      // Vertical wall - right face
      ctx.fillStyle='rgba(30,30,80,0.9)';
      ctx.beginPath();
      ctx.moveTo(w.x+w.w,w.y);ctx.lineTo(w.x+w.w+depth,w.y-depth);
      ctx.lineTo(w.x+w.w+depth,w.y+w.h-depth);ctx.lineTo(w.x+w.w,w.y+w.h);
      ctx.closePath();ctx.fill();
    }

    // Top face
    ctx.fillStyle='rgba(80,80,160,0.6)';
    ctx.beginPath();
    ctx.moveTo(w.x,w.y);ctx.lineTo(w.x+depth,w.y-depth);
    ctx.lineTo(w.x+w.w+depth,w.y-depth);ctx.lineTo(w.x+w.w,w.y);
    ctx.closePath();ctx.fill();

    // Front face
    const wGrad=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    wGrad.addColorStop(0,'rgba(100,120,255,0.5)');wGrad.addColorStop(1,'rgba(60,60,160,0.5)');
    ctx.fillStyle=wGrad;
    ctx.strokeStyle='rgba(150,170,255,0.4)';ctx.lineWidth=1;
    ctx.shadowColor='rgba(100,150,255,0.4)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(w.x,w.y,w.w,w.h,4);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;

    // Neon edge on front
    ctx.strokeStyle=`rgba(150,170,255,${0.3+Math.sin(t*2+w.x*0.05)*0.15})`;
    ctx.lineWidth=1.5;ctx.shadowColor='rgba(150,170,255,0.5)';ctx.shadowBlur=5;
    ctx.beginPath();ctx.roundRect(w.x,w.y,w.w,w.h,4);ctx.stroke();
    ctx.shadowBlur=0;
  });
}

function drawPickup3D(pu,frame){
  const pulse=Math.sin(frame*0.08+pu.x*0.05);
  const r=12+pulse*2;
  const hover=Math.sin(frame*0.06+pu.y*0.05)*4;
  ctx.save();
  ctx.translate(pu.x,pu.y+hover);

  // Ground glow
  ctx.save();ctx.translate(0,-hover);
  const gg=ctx.createRadialGradient(0,8,0,0,8,20);
  gg.addColorStop(0,WCOLOR[pu.type].replace(')',',0.3)').replace('rgb','rgba')||'rgba(255,255,100,0.2)');
  gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.ellipse(0,8,18,8,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // 3D box shape
  const d=4;
  const c=WCOLOR[pu.type];
  // Shadow side
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.roundRect(-r/2+d,-r/2+d,r,r,5);ctx.fill();
  // Right side
  ctx.fillStyle=c+'88';
  ctx.beginPath();ctx.moveTo(r/2,-r/2);ctx.lineTo(r/2+d,-r/2-d);ctx.lineTo(r/2+d,r/2-d);ctx.lineTo(r/2,r/2);ctx.closePath();ctx.fill();
  // Top
  ctx.fillStyle=c+'bb';
  ctx.beginPath();ctx.moveTo(-r/2,-r/2);ctx.lineTo(-r/2+d,-r/2-d);ctx.lineTo(r/2+d,-r/2-d);ctx.lineTo(r/2,-r/2);ctx.closePath();ctx.fill();
  // Front
  const pg=ctx.createLinearGradient(-r/2,-r/2,r/2,r/2);
  pg.addColorStop(0,c+'ff');pg.addColorStop(1,c+'99');
  ctx.fillStyle=pg;ctx.shadowColor=c;ctx.shadowBlur=15;
  ctx.beginPath();ctx.roundRect(-r/2,-r/2,r,r,5);ctx.fill();
  ctx.shadowBlur=0;

  // Icon
  ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(WICON[pu.type]||'?',0,0);

  ctx.restore();
}

function drawBullet3D(b){
  ctx.save();ctx.translate(b.x,b.y);
  const c=WCOLOR[b.type]||'#fff';
  ctx.shadowColor=c;ctx.shadowBlur=12;

  if(b.type==='bomb'){
    // 3D sphere
    const sg=ctx.createRadialGradient(-3,-3,1,-3,-3,8);
    sg.addColorStop(0,'#e9d5ff');sg.addColorStop(0.4,c);sg.addColorStop(1,'#4c1d95');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
    // Fuse spark
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(4,-5,2,0,Math.PI*2);ctx.fill();
  }else if(b.type==='laser'){
    const lg=ctx.createLinearGradient(-14,0,14,0);
    lg.addColorStop(0,'transparent');lg.addColorStop(0.3,c);lg.addColorStop(0.5,'#fff');lg.addColorStop(0.7,c);lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg;ctx.fillRect(-14,-2,28,4);
  }else{
    const bg=ctx.createRadialGradient(0,0,0,0,0,7);
    bg.addColorStop(0,'#fff');bg.addColorStop(0.4,c);bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,8,3,Math.atan2(b.vy||0,b.vx||0),0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.restore();
  // Trail
  if(Math.random()<0.5)addParticles(b.x,b.y,c,1);
}

// ============================================================
// MAIN RENDER
// ============================================================
function renderFrame(state){
  ctx.save();

  // Screen shake
  if(screenShake.t>0){
    ctx.translate(screenShake.x,screenShake.y);
    screenShake.t--;
    if(screenShake.t<=0){screenShake.x=0;screenShake.y=0;}
    else{screenShake.x*=0.85;screenShake.y*=0.85;}
  }

  drawArena3D();

  // Pickups
  if(state.pickups)state.pickups.forEach(p=>drawPickup3D(p,state.frame));

  // Mines
  if(state.bullets)state.bullets.filter(b=>b.type==='mine'&&b.placed).forEach(b=>{
    ctx.save();ctx.translate(b.x,b.y);
    const mp=0.7+Math.sin(state.frame*0.15)*0.3;
    const mg=ctx.createRadialGradient(-2,-2,0,-2,-2,9);
    mg.addColorStop(0,'#f1f5f9');mg.addColorStop(0.6,'#64748b');mg.addColorStop(1,'#1e293b');
    ctx.fillStyle=mg;ctx.shadowColor='#ef4444';ctx.shadowBlur=mp*10;
    ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(239,68,68,${mp})`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  });

  // Bullets
  if(state.bullets)state.bullets.filter(b=>!b.placed).forEach(drawBullet3D);

  // Cars sorted by y (painter's algo for pseudo-3D depth)
  if(state.players){
    [...state.players].sort((a,b)=>a.y-b.y).forEach(car=>drawCar3D(car,state.frame));
  }

  // Particles
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.vy+=0.05;p.life--;
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    if(p.type==='spark'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot+=p.rotV);
      ctx.fillStyle=p.color;ctx.fillRect(-p.r,-p.r*3,p.r*2,p.r*6);
      ctx.restore();
    }else{
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=p.r*3;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    return p.life>0;
  });

  // Watermark inside canvas
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.font='8px Orbitron,monospace';ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText('by UTKARSH',W-8,H-6);

  ctx.restore();
}

// ============================================================
// HUD UPDATE
// ============================================================
function updateHud(state){
  if(!state.players)return;
  state.players.forEach(car=>{
    const isMe=car.slot===mySlot;
    const s=isMe?'1':'2';
    const hpEl=document.getElementById('hp'+s);
    hpEl.style.width=car.hp+'%';
    if(car.hp>60)hpEl.style.background='linear-gradient(90deg,#15803d,#22c55e)';
    else if(car.hp>30)hpEl.style.background='linear-gradient(90deg,#b45309,#f59e0b)';
    else hpEl.style.background='linear-gradient(90deg,#991b1b,#ef4444)';
    document.getElementById('am'+s).style.width=(car.ammo/12*100)+'%';
    const wEl=document.getElementById('w'+s);
    wEl.textContent=(WICON[car.weapon]||'')+' '+(WNAME[car.weapon]||car.weapon);
    wEl.style.color=WCOLOR[car.weapon];wEl.style.borderColor=(WCOLOR[car.weapon]||'#fff')+'33';
    document.getElementById('sc'+s).textContent=car.score;
    const si=document.getElementById('si'+s);
    si.textContent='';
    if(car.shielded>0)si.textContent+='🛡 ';
    if(car.speedBoost>0)si.textContent+='💨 ';
    if(car.invincible>0)si.textContent+='✨ ';
  });
}

// ============================================================
// OVERLAY
// ============================================================
function showOverlay(title,msg,btns,glow=true){
  document.getElementById('ov-title').innerHTML=title;
  document.getElementById('ov-msg').innerHTML=msg;
  const row=document.getElementById('ov-btns');row.innerHTML='';
  btns.forEach(b=>{
    const btn=document.createElement('button');
    btn.textContent=b.label;btn.className='btn '+(b.cls||'btn-blue');
    btn.onclick=new Function(b.fn);row.appendChild(btn);
  });
  document.getElementById('overlay').style.display='block';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

// Initial render
ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
</script>
