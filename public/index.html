<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmashCars 🏎️</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f1a;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  h1{font-size:2.2rem;font-weight:700;letter-spacing:2px;margin-bottom:6px;background:linear-gradient(90deg,#60a5fa,#a78bfa,#f87171);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #lobby{text-align:center;max-width:420px;width:100%;padding:20px}
  #lobby p{color:#aaa;margin-bottom:20px;font-size:14px}
  .input-row{display:flex;gap:10px;margin-bottom:12px}
  input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:15px;outline:none}
  input:focus{border-color:#60a5fa}
  input::placeholder{color:#666}
  button{padding:12px 22px;background:#3b5bdb;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
  button:hover{background:#4c6ef5}
  button.red{background:#c92a2a}button.red:hover{background:#e03131}
  button.green{background:#2f9e44}button.green:hover{background:#37b24d}
  #game-wrap{display:none;position:relative;width:100vw;height:100vh;justify-content:center;align-items:center;flex-direction:column}
  #game-wrap.active{display:flex}
  canvas{border-radius:12px;border:1px solid rgba(255,255,255,0.1);display:block;max-width:100vw}
  #hud{position:absolute;top:8px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:10}
  .phud{background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 14px;min-width:130px;font-size:13px}
  .bar-bg{height:8px;background:rgba(255,255,255,0.12);border-radius:4px;margin-top:5px;overflow:hidden}
  .bar{height:100%;border-radius:4px;transition:width 0.15s}
  #overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,26,0.92);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:28px 36px;text-align:center;z-index:20;min-width:260px}
  #overlay h2{font-size:1.5rem;margin-bottom:8px}
  #overlay p{color:#aaa;font-size:14px;margin-bottom:18px}
  .btn-row{display:flex;gap:10px;justify-content:center}
  #room-info{font-size:12px;color:#666;margin-top:8px}
  .weapon-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,0.1);margin-top:4px}
  #mobile-controls{display:none;position:absolute;bottom:12px;left:0;width:100%;pointer-events:none;z-index:15}
  @media(max-width:700px){
    canvas{width:100vw!important;height:auto!important}
    #mobile-controls{display:flex;justify-content:space-between;padding:0 12px}
  }
</style>
</head>
<body>

<div id="lobby">
  <h1>SmashCars 🏎️</h1>
  <p>Real-time 2-player battle. Share your room code with a friend!</p>
  <div class="input-row">
    <input id="roomInput" placeholder="Room code (e.g. battle42)" maxlength="20"/>
    <button onclick="joinRoom()">Join / Create</button>
  </div>
  <button onclick="randomRoom()" style="width:100%;background:#5c3d9e">🎲 Random Room</button>
  <div id="room-info"></div>
</div>

<div id="game-wrap">
  <div id="hud">
    <div class="phud" id="hud1">
      <div style="color:#60a5fa;font-weight:600">You (P1)</div>
      <div style="font-size:11px;color:#888;margin-top:2px">HP</div>
      <div class="bar-bg"><div class="bar" id="hp1" style="width:100%;background:#4ade80"></div></div>
      <div style="font-size:11px;color:#888;margin-top:4px">Ammo</div>
      <div class="bar-bg"><div class="bar" id="am1" style="width:100%;background:#f59e0b"></div></div>
      <div class="weapon-badge" id="w1">Rocket</div>
      <div style="font-size:12px;margin-top:4px">Score: <span id="sc1">0</span></div>
    </div>
    <div id="hudmid" style="text-align:center;pointer-events:auto">
      <div style="font-size:12px;color:#555;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:8px;cursor:pointer" onclick="leaveGame()">✕ Leave</div>
    </div>
    <div class="phud" id="hud2" style="text-align:right">
      <div style="color:#f87171;font-weight:600">Opponent (P2)</div>
      <div style="font-size:11px;color:#888;margin-top:2px">HP</div>
      <div class="bar-bg"><div class="bar" id="hp2" style="width:100%;background:#f87171"></div></div>
      <div style="font-size:11px;color:#888;margin-top:4px">Ammo</div>
      <div class="bar-bg"><div class="bar" id="am2" style="width:100%;background:#f59e0b"></div></div>
      <div class="weapon-badge" id="w2" style="float:right">Rocket</div>
      <div style="font-size:12px;margin-top:4px;clear:both">Score: <span id="sc2">0</span></div>
    </div>
  </div>
  <canvas id="gc" width="680" height="420"></canvas>
  <div id="overlay">
    <h2 id="ov-title">Waiting...</h2>
    <p id="ov-msg">Share your room code with a friend</p>
    <div class="btn-row" id="ov-btns"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 680, H = 420;

let myId = null, mySlot = null, roomId = null;
let gameState = null, gameActive = false;
let keys = {}, shootCooldown = 0;

const WCOLOR = { rocket:'#f59e0b', laser:'#60a5fa', bomb:'#a78bfa', shield:'#4ade80' };
const WALLS = [
  {x:334,y:80,w:12,h:260},
  {x:60,y:202,w:120,h:16},
  {x:500,y:202,w:120,h:16}
];

// ---- LOBBY ----
function joinRoom() {
  const val = document.getElementById('roomInput').value.trim();
  if (!val) { alert('Enter a room code!'); return; }
  roomId = val.toLowerCase().replace(/\s+/g,'');
  socket.emit('joinRoom', { roomId });
}
function randomRoom() {
  const code = Math.random().toString(36).slice(2,8);
  document.getElementById('roomInput').value = code;
  joinRoom();
}
function leaveGame() {
  location.reload();
}

socket.on('joined', ({ slot, roomId: rid }) => {
  mySlot = slot;
  roomId = rid;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-wrap').classList.add('active');
  updateHudLabels();
});

socket.on('waiting', () => {
  showOverlay('Waiting for opponent...', `Room: <b>${roomId}</b> — share this code with your friend!`, []);
});

socket.on('roomFull', () => {
  alert('Room is full! Try a different code.');
});

socket.on('startGame', ({ players }) => {
  gameActive = true;
  hideOverlay();
  // map score from server
  players.forEach(p => {
    if (p.slot === 0) document.getElementById('sc1').textContent = p.score || 0;
    else document.getElementById('sc2').textContent = p.score || 0;
  });
});

socket.on('state', (state) => {
  gameState = state;
  renderFrame(state);
  updateHud(state);
});

socket.on('gameOver', ({ winnerId, winnerSlot }) => {
  gameActive = false;
  const iWon = winnerId === myId || winnerSlot === mySlot;
  showOverlay(
    iWon ? '🏆 You Win!' : '💀 You Lost!',
    'GG! Play again?',
    [{ label: '▶ Rematch', cls: 'green', fn: 'restartGame()' },
     { label: '✕ Leave', cls: 'red', fn: 'leaveGame()' }]
  );
});

socket.on('playerLeft', () => {
  gameActive = false;
  showOverlay('Opponent Left', 'Your opponent disconnected.', [{ label: '✕ Leave', cls: 'red', fn: 'leaveGame()' }]);
});

socket.on('connect', () => { myId = socket.id; });

function restartGame() {
  socket.emit('restartGame');
}

// ---- INPUT ----
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if ((e.key === ' ' || e.key === 'Enter') && gameActive && shootCooldown <= 0) {
    socket.emit('shoot');
    shootCooldown = 15;
  }
  socket.emit('keys', { ...keys });
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
  socket.emit('keys', { ...keys });
});
setInterval(() => { if (shootCooldown > 0) shootCooldown--; }, 16);

// ---- RENDER ----
function renderFrame(state) {
  // arena
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // border
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W-2, H-2);

  // walls
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  WALLS.forEach(w => { ctx.beginPath(); ctx.roundRect(w.x,w.y,w.w,w.h,3); ctx.fill(); });

  // pickups
  if (state.pickups) state.pickups.forEach(pu => {
    ctx.save();
    ctx.translate(pu.x, pu.y);
    const r = 10 + Math.sin(state.frame * 0.08 + pu.x) * 2;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = WCOLOR[pu.type];
    ctx.beginPath(); ctx.arc(0, 0, r+3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = WCOLOR[pu.type];
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pu.type[0].toUpperCase(), 0, 0);
    ctx.restore();
  });

  // bullets
  if (state.bullets) state.bullets.forEach(b => {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.fillStyle = WCOLOR[b.type] || '#fff';
    ctx.beginPath();
    if (b.type === 'bomb') { ctx.arc(0, 0, 7, 0, Math.PI*2); }
    else if (b.type === 'laser') { ctx.fillRect(-8, -1, 16, 2); }
    else { ctx.ellipse(0, 0, 6, 2, Math.atan2(b.vy, b.vx), 0, Math.PI*2); }
    ctx.fill();
    ctx.restore();
  });

  // cars
  if (state.players) state.players.forEach(car => {
    const isMe = car.slot === mySlot;
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);
    if (car.shielded > 0) {
      ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2);
      ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + Math.sin(state.frame * 0.2) * 0.3;
      ctx.stroke(); ctx.globalAlpha = 1;
    }
    ctx.fillStyle = car.slot === 0 ? '#60a5fa' : '#f87171';
    ctx.beginPath(); ctx.roundRect(-14, -9, 28, 18, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(0, -7, 12, 14, 3); ctx.fill();
    // wheels
    ctx.fillStyle = '#1a1a2e';
    [[-12,7,8,4],[-12,-11,8,4],[3,7,8,4],[3,-11,8,4]].forEach(([x,y,w,h])=>{
      ctx.beginPath(); ctx.roundRect(x,y,w,h,2); ctx.fill();
    });
    // gun dot
    ctx.fillStyle = WCOLOR[car.weapon] || '#fff';
    ctx.beginPath(); ctx.arc(4, 0, 3, 0, Math.PI*2); ctx.fill();
    // name tag
    ctx.rotate(-car.angle);
    ctx.fillStyle = isMe ? '#60a5fa' : '#f87171';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(isMe ? 'YOU' : 'OPP', 0, -14);
    ctx.restore();
  });
}

function updateHud(state) {
  if (!state.players) return;
  state.players.forEach(car => {
    const isMe = car.slot === mySlot;
    const suffix = isMe ? '1' : '2';
    document.getElementById('hp'+suffix).style.width = (car.hp / 100 * 100) + '%';
    document.getElementById('am'+suffix).style.width = (car.ammo / 10 * 100) + '%';
    document.getElementById('w'+suffix).textContent = cap(car.weapon);
    document.getElementById('sc'+suffix).textContent = car.score;
  });
}

function updateHudLabels() {
  if (mySlot === 1) {
    document.getElementById('hud1').querySelector('div').textContent = 'Opponent (P1)';
    document.getElementById('hud1').querySelector('div').style.color = '#60a5fa';
    document.getElementById('hud2').querySelector('div').textContent = 'You (P2)';
    document.getElementById('hud2').querySelector('div').style.color = '#f87171';
  }
}

function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

function showOverlay(title, msg, btns) {
  document.getElementById('ov-title').innerHTML = title;
  document.getElementById('ov-msg').innerHTML = msg;
  const row = document.getElementById('ov-btns');
  row.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = b.cls || '';
    btn.onclick = new Function(b.fn);
    row.appendChild(btn);
  });
  document.getElementById('overlay').style.display = 'block';
}
function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// initial idle render
ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.font = '18px sans-serif';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillText('Waiting for players...', W/2, H/2);
</script>
</body>
</html>
